apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
- ../../base
- sealed-secret-db.yaml
- ingress.yaml
patches:
- path: patch-replicas.yaml
configMapGenerator:
- behavior: merge
  literals:
  - environment=dev
  name: demo-app-config
images:
- name: demo-app
  newName: ghcr.io/lwbaleeiro/demo-app
  newTag: cb88ddb
