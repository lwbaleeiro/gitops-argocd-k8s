apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
  - sealed-secret-db.yaml
patches:
  - path: patch-replicas.yaml
configMapGenerator:
  - name: demo-app-config
    behavior: merge
    literals:
      - environment=dev
images:
  - name: demo-app
    newName: ghcr.io/lwbaleeiro/demo-app
    newTag: latest