<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>GitOps Demo App</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0d1117;
            color: #c9d1d9;
        }

        .card {
            text-align: center;
            padding: 2rem;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #161b22;
        }

        h1 {
            color: #58a6ff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: #238636;
            color: #fff;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚀 GitOps Demo App - v1.1</h1>
        <p>Versão deployada via GitHub Actions + ArgoCD</p>
        <span class="badge">ambiente: dev</span>
    </div>
</body>

</html>
